# ═══════════════════════════════════════════════════════════════
#  Publica la versión web de ActiveCard en GitHub Pages.
#  Corre sin el .env (está gitignoreado): las claves de Claude/Notion NO
#  quedan embebidas en esta build pública — se cargan a mano en Ajustes.
# ═══════════════════════════════════════════════════════════════
name: Deploy web

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Exportar la app como sitio estático
        run: npx expo export -p web

      - name: Fallback de SPA para rutas profundas (GitHub Pages no tiene rewrites)
        run: cp dist/index.html dist/404.html

      - name: Evitar que GitHub Pages procese la carpeta con Jekyll
        run: touch dist/.nojekyll

      - name: Preparar el artefacto de Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
