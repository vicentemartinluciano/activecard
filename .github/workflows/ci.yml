# ═══════════════════════════════════════════════════════════════
#  CI de ActiveCard — el "inspector de calidad" automático.
#  En cada cambio subido a GitHub, una máquina limpia instala todo,
#  pasa el corrector (ESLint) y corre los tests (Jest).
#  Resultado: ✓ verde o ✗ roja al lado de cada commit en GitHub.
# ═══════════════════════════════════════════════════════════════
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verificar:
    name: Corrector + tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependencias (limpio, como un usuario nuevo)
        run: npm ci

      - name: Corrector de código (ESLint)
        run: npx eslint . --max-warnings 0

      - name: Tests de la lógica (Jest)
        run: npx jest --ci
